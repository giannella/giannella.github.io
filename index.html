<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Embedded Survey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #f4f4f4;
      font-family: Georgia, serif;
    }

    #survey-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    #error-banner {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 12px 20px;
      font-size: 0.9rem;
      border-bottom: 1px solid #ffc107;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="error-banner">
    ⚠️ No <code>sguid</code> parameter found in the URL. Loading survey without it.
  </div>

  <iframe
    id="survey-frame"
    src="about:blank"
    title="Survey"
    allowfullscreen
  ></iframe>

  <script>
    (function () {
      const BASE_URL = "https://survey.alchemer.com/s3/8641608/Test-Survey";
      const PARAM_NAME = "sguid";

      // Read the sguid value from the current page's URL
      const pageParams = new URLSearchParams(window.location.search);
      const sguid = pageParams.get(PARAM_NAME);

      let surveyURL;

      if (sguid) {
        // Build the iframe URL with the sguid parameter
        const url = new URL(BASE_URL);
        url.searchParams.set(PARAM_NAME, sguid);
        surveyURL = url.toString();
      } else {
        // No sguid found — show a subtle warning and load the base URL
        document.getElementById("error-banner").style.display = "block";
        surveyURL = BASE_URL;
      }

      document.getElementById("survey-frame").src = surveyURL;
    })();
  </script>

</body>
</html>
